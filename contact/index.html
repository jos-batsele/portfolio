<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="/css/global.css" />
    <link rel="stylesheet" href="/css/contact.css" />

    <link rel="icon" href="/images/icon/Website Icon.png" type="image/png" />

    <!-- Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Rubik+Mono+One&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Elms+Sans&display=swap"
      rel="stylesheet"
    />

    <!----- Icons ----->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <link rel="icon" href="/images/icon/Website Icon.png" type="image/png" />
  </head>

  <body>
    <!----- Navigation ----->
    <nav class="contact-navbar">
      <div class="contact-logo"><a href="/index.html">Rozemarijn Tack</a></div>
      <ul class="contact-nav-links">
        <li><a href="/index.html#about">Over mij</a></li>
        <li><a href="/index.html#projects">Projecten</a></li>
        <li><a href="/contact/">Contact</a></li>
      </ul>
    </nav>

    <!-- Contact Section -->
    <section class="contact">
      <div class="contact-container">
        <h1>Contact</h1>

        <form
          class="contact-form"
          action="https://formspree.io/f/mnjoebre"
          method="POST"
        >
          <div class="form-row">
            <div class="form-group">
              <label>Voornaam</label>
              <input
                type="text"
                name="voornaam"
                placeholder="Voornaam"
                required
              />
            </div>

            <div class="form-group">
              <label>Familienaam</label>
              <input
                type="text"
                name="familienaam"
                placeholder="Familienaam"
                required
              />
            </div>
          </div>

          <div class="form-group">
            <label>Email</label>
            <input
              type="email"
              name="email"
              placeholder="jouw@email.com"
              required
            />
          </div>

          <div class="form-group">
            <label>Onderwerp</label>
            <input
              type="text"
              name="subject"
              placeholder="Waarover wil je het hebben?"
            />
          </div>

          <div class="form-group">
            <label>Bericht</label>
            <textarea
              name="message"
              rows="6"
              placeholder="Jouw berichtje aan mij ..."
              required
            ></textarea>
          </div>

          <button type="submit" class="contact-button">Versturen</button>
        </form>
      </div>
    </section>
  </body>

  <footer class="footer">
    <div class="footer-container">
      <div class="footer-top">
        <div class="footer-left">

        </div>

        <div class="footer-center">
          <p>
            <a href="mailto:tack.rozemarijn@gmail.com">
              tack.rozemarijn@gmail.be
            </a>
          </p>
          <p><a href="tel:+32470307717">+32 470 30 77 17</a></p>
        </div>

        <div class="footer-right">
          <a
            href="https://www.instagram.com/loumi_designstudio/"
            target="_blank"
            class="icon"
          >
            <i class="fa-brands fa-instagram"></i>
          </a>
          <a href="https://www.linkedin.com/" target="_blank" class="icon">
            <i class="fa-brands fa-linkedin"></i>
          </a>
        </div>
      </div>

      <div class="footer-bottom">
        <p class="footer-copyright">© 2026 Rozemarijn Tack — Portfolio</p>
      </div>
    </div>
  </footer>
</html>
